[mod-setting-description]
swap_rail_layer_debug=Intended for development use only. Leave this off if you're just playing the game with this mod.
swap_rail_layer_overwrite_blueprints=Will allow the mod to overwrite the contents of blueprints in the "game blueprints" library. Blueprints in the cross-save blueprint library can never be overwritten.
